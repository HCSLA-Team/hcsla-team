evaluator: surrogate

n_evals: 50
seed: 42
multi_seed_n: 10

surrogate:
  noise_std: 0.05

isaac_gym:
  num_envs: 4096
  episode_length: 1000
  headless: true
  sim_dt: 0.005
  control_dt: 0.02
  n_eval_episodes: 3
  normalize_reward: true
  max_return: 5000.0
  task: Quadruped
  checkpoint_dir: checkpoints
  ppo_train_steps: 500
